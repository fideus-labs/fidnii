<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" preserveAspectRatio="xMidYMid meet" viewBox="17.242414994673346 15 113.09090909090907 115.80278931174797" width="109.09" height="111.8">
  <defs>
    <!-- Volume cube faces (same geometry as volume.svg) -->
    <path d="M72.79 16L127.33 47.38L72.79 75.19L18.24 47.38L72.79 16Z" id="topFace"/>
    <path d="M72.79 127.78L18.24 101.15L18.24 47.32L72.79 74.98L72.79 127.78Z" id="leftFace"/>
    <path d="M127.33 101.63L127.31 47.32L72.77 74.41L72.8 127.8L127.33 101.63Z" id="rightFace"/>

    <!-- Gradients (same as volume.svg) -->
    <linearGradient id="gTop" gradientUnits="userSpaceOnUse" x1="72.79" y1="74.26" x2="71.79" y2="1.46">
      <stop stop-color="#8dbee6" offset="0%"/>
      <stop stop-color="#3384c5" offset="100%"/>
    </linearGradient>
    <linearGradient id="gLeft" gradientUnits="userSpaceOnUse" x1="71.52" y1="75.19" x2="43.85" y2="112.11">
      <stop stop-color="#7bb2de" offset="0%"/>
      <stop stop-color="#3789cb" offset="100%"/>
    </linearGradient>
    <linearGradient id="gRight" gradientUnits="userSpaceOnUse" x1="72.77" y1="75.19" x2="110.07" y2="109.46">
      <stop stop-color="#7db2dd" offset="0%"/>
      <stop stop-color="#3384c5" offset="100%"/>
    </linearGradient>

    <!-- Green plane strip across the top face (axial) -->
    <path d="M31.63 39.68L113.94 39.68L119.22 51.51L26.35 51.51Z" id="greenStrip"/>
    <!-- Red plane strip on the left face (coronal) -->
    <path d="M18.24 68.85L72.79 96.10L72.79 106.66L18.24 79.62Z" id="redStrip"/>
    <!-- Yellow plane strip on the right face (sagittal) -->
    <path d="M127.32 69.04L72.78 95.77L72.79 106.44L127.32 79.91Z" id="yellowStrip"/>
  </defs>

  <g>
    <!-- Semi-transparent volume cube -->
    <use xlink:href="#topFace" opacity="0.7" fill="url(#gTop)"/>
    <use xlink:href="#leftFace" opacity="0.7" fill="url(#gLeft)"/>
    <use xlink:href="#leftFace" opacity="0.7" fill-opacity="0" stroke="#ffffff" stroke-width="1" stroke-opacity="1"/>
    <use xlink:href="#rightFace" opacity="0.7" fill="url(#gRight)"/>
    <use xlink:href="#rightFace" opacity="0.7" fill-opacity="0" stroke="#ffffff" stroke-width="1" stroke-opacity="1"/>

    <!-- Colored slice plane overlays -->
    <use xlink:href="#greenStrip" opacity="0.85" fill="#59d87d"/>
    <use xlink:href="#redStrip" opacity="0.85" fill="#ff7b7b"/>
    <use xlink:href="#yellowStrip" opacity="0.85" fill="#ffff72"/>
  </g>
</svg>
